version: "3.8"

services:
  tavily-proxy:
    image: ghcr.io/kore-01/tavily:latest
    pull_policy: always
    ports:
      - "5050:5050"
    environment:
      - LISTEN_ADDR=:5050
      - DATABASE_PATH=/app/data/proxy.db
      - TAVILY_BASE_URL=https://api.tavily.com
      - UPSTREAM_TIMEOUT=30s
    volumes:
      - ./data:/app/data
      # Sync host timezone (Linux): mount host timezone files into container.
      - /etc/localtime:/etc/localtime:ro
    restart: unless-stopped
